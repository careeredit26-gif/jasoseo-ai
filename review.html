<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자소서 첨삭 — AI 첨삭 서비스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e1a;
    --bg-dark: #111827;
    --bg-card: #1a2035;
    --text-primary: #e8ecf4;
    --text-secondary: #9ba3b5;
    --accent: #4f6ef7;
    --accent-glow: rgba(79, 110, 247, 0.25);
    --cta: #ff6b3d;
    --cta-hover: #ff8a62;
    --green: #34d399;
    --red: #f87171;
    --border-light: rgba(255,255,255,0.06);
    --plus-gradient: linear-gradient(135deg, #4f6ef7 0%, #7c5bf5 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--bg-deep);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 40px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-light);
  }
  .nav-logo {
    font-weight: 800; font-size: 18px;
    background: var(--plus-gradient);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    text-decoration: none;
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-credits {
    padding: 6px 14px; border-radius: 8px;
    background: rgba(79,110,247,0.1);
    border: 1px solid rgba(79,110,247,0.2);
    font-size: 12px; color: var(--accent); font-weight: 600;
  }
  .nav-btn {
    padding: 6px 14px; border-radius: 8px;
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-secondary); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    text-decoration: none;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── LAYOUT ── */
  .app { padding: 88px 24px 40px; max-width: 1200px; margin: 0 auto; }

  .app-grid {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 24px;
    min-height: calc(100vh - 128px);
  }
  @media (max-width: 960px) {
    .app-grid { grid-template-columns: 1fr; }
  }

  /* ── INPUT PANEL ── */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 32px 28px;
    height: fit-content;
    position: sticky;
    top: 88px;
  }
  .panel h2 {
    font-size: 20px; font-weight: 800;
    margin-bottom: 24px; letter-spacing: -0.5px;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff; font-size: 14px;
    font-family: inherit; outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { min-height: 200px; line-height: 1.7; }
  .field .char-count {
    text-align: right; font-size: 12px;
    color: var(--text-secondary); margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .field .char-count.warn { color: var(--red); }

  .submit-btn {
    width: 100%; padding: 16px;
    border-radius: 12px; border: none;
    background: var(--cta); color: #fff;
    font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { background: var(--cta-hover); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-btn .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.6s linear infinite; display: none;
  }
  .submit-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESULT PANEL ── */
  .result-panel {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px;
    padding: 32px 28px;
    min-height: 400px;
  }
  .result-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 400px; text-align: center;
    color: var(--text-secondary);
  }
  .result-empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .result-empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
  .result-empty p { font-size: 14px; font-weight: 300; }

  /* Result sections */
  .result-section { margin-bottom: 32px; }
  .result-section h3 {
    font-size: 16px; font-weight: 700;
    margin-bottom: 16px; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .result-section h3 .badge {
    padding: 3px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 700;
  }
  .badge-blue { background: rgba(79,110,247,0.15); color: var(--accent); }
  .badge-green { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--red); }

  .company-box {
    padding: 20px; border-radius: 12px;
    background: rgba(79,110,247,0.06);
    border: 1px solid rgba(79,110,247,0.15);
  }
  .company-box .company-name { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .company-box .values {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .company-box .values span {
    padding: 4px 10px; border-radius: 6px;
    background: rgba(79,110,247,0.1); color: var(--accent);
    font-size: 12px; font-weight: 600;
  }
  .company-box .strategy { font-size: 14px; color: var(--text-secondary); font-weight: 300; line-height: 1.7; }

  /* Diagnosis table */
  .diag-list { display: flex; flex-direction: column; gap: 12px; }
  .diag-item {
    padding: 18px; border-radius: 12px;
    border: 1px solid var(--border-light);
    background: rgba(255,255,255,0.02);
  }
  .diag-original {
    font-size: 14px; color: var(--text-secondary);
    margin-bottom: 8px; font-weight: 300; line-height: 1.7;
    padding-left: 12px;
    border-left: 3px solid var(--red);
  }
  .diag-issue {
    font-size: 13px; color: var(--red);
    margin-bottom: 8px; font-weight: 500;
  }
  .diag-alt {
    font-size: 14px; color: var(--green);
    font-weight: 500; line-height: 1.7;
    padding-left: 12px;
    border-left: 3px solid var(--green);
  }
  .severity {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; margin-left: 8px;
  }
  .severity-high { background: rgba(248,113,113,0.15); color: var(--red); }
  .severity-medium { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .severity-low { background: rgba(52,211,153,0.15); color: var(--green); }

  /* Scores */
  .scores-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
  }
  .score-item {
    padding: 16px; border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-light);
    text-align: center;
  }
  .score-item .score-val {
    font-size: 28px; font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
  }
  .score-item .score-label {
    font-size: 12px; color: var(--text-secondary); margin-top: 4px;
  }

  /* Revised text */
  .revised-text {
    padding: 24px; border-radius: 12px;
    background: rgba(52,211,153,0.04);
    border: 1px solid rgba(52,211,153,0.15);
    font-size: 15px; line-height: 1.85;
    color: var(--text-primary); font-weight: 300;
    white-space: pre-wrap;
    position: relative;
  }
  .copy-btn {
    position: absolute; top: 12px; right: 12px;
    padding: 6px 12px; border-radius: 6px;
    background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2);
    color: var(--green); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .copy-btn:hover { background: rgba(52,211,153,0.2); }

  .summary-text {
    font-size: 15px; line-height: 1.7;
    color: var(--text-primary); font-weight: 400;
    padding: 20px; border-radius: 12px;
    background: rgba(79,110,247,0.06);
    border: 1px solid rgba(79,110,247,0.15);
  }

  /* ── REVISE SECTION ── */
  .revise-section {
    margin-top: 32px; padding-top: 32px;
    border-top: 1px solid var(--border-light);
  }
  .revise-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .revise-input {
    display: flex; gap: 12px;
  }
  .revise-input textarea {
    flex: 1; padding: 12px 16px; min-height: 80px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff; font-size: 14px;
    font-family: inherit; outline: none;
    resize: vertical;
  }
  .revise-input textarea:focus { border-color: var(--accent); }
  .revise-btn {
    padding: 12px 24px; border-radius: 10px;
    background: var(--accent); color: #fff; border: none;
    font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    white-space: nowrap; align-self: flex-end;
  }
  .revise-btn:hover { opacity: 0.9; }
  .revise-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── HISTORY SIDEBAR ── */
  .history-list { margin-top: 24px; }
  .history-list h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-secondary); }
  .history-item {
    padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--border-light);
    margin-bottom: 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item.active { border-color: var(--accent); background: rgba(79,110,247,0.06); }
  .history-item .hi-company { font-size: 13px; font-weight: 700; }
  .history-item .hi-question { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 300; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-item .hi-meta { font-size: 11px; color: var(--text-secondary); margin-top: 4px; opacity: 0.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 80px; right: 24px;
    padding: 14px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 600;
    z-index: 2000;
    transform: translateX(120%);
    transition: transform 0.3s ease;
  }
  .toast.visible { transform: translateX(0); }
  .toast.success { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
  .toast.error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .app { padding: 76px 16px 24px; }
    .panel { position: static; }
    .scores-grid { grid-template-columns: 1fr 1fr; }
    .revise-input { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">자소서 AI 첨삭</a>
  <div class="nav-right" id="navRight">
    <span class="nav-credits" id="navCredits">로딩 중...</span>
    <a href="/" class="nav-btn">홈</a>
    <button class="nav-btn" onclick="doLogout()">로그아웃</button>
  </div>
</nav>

<div class="app">
  <div class="app-grid">

    <!-- INPUT PANEL -->
    <div>
      <div class="panel">
        <h2>자소서 첨삭</h2>

        <div class="field">
          <label>지원 기업</label>
          <input type="text" id="companyName" placeholder="예: 삼성전자, 카카오, SK하이닉스">
        </div>

        <div class="field">
          <label>자소서 질문</label>
          <input type="text" id="question" placeholder="예: 본인의 성장 과정과 이를 통해 배운 점을 기술하세요">
        </div>

        <div class="field">
          <label>자소서 내용</label>
          <textarea id="essayText" placeholder="자소서 내용을 붙여넣으세요..."></textarea>
          <div class="char-count" id="charCount">0자 (문항 1개 소진 예상)</div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitReview()">
          <span class="spinner"></span>
          <span class="btn-text">첨삭 시작하기</span>
        </button>

        <!-- History -->
        <div class="history-list" id="historyList" style="display:none;">
          <h3>첨삭 기록</h3>
          <div id="historyItems"></div>
        </div>
      </div>
    </div>

    <!-- RESULT PANEL -->
    <div class="result-panel" id="resultPanel">
      <div class="result-empty" id="resultEmpty">
        <div class="icon">&#9998;</div>
        <h3>자소서를 입력하고 첨삭을 시작하세요</h3>
        <p>기업명과 자소서를 입력하면, AI가 문장별 진단과<br>구체적 수정안을 제시합니다.</p>
      </div>
      <div id="resultContent" style="display:none;"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let currentUser = null;
let currentPlans = [];
let currentReviewId = null;
let history = [];

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = '/';
    return;
  }

  try {
    currentUser = await apiFetch('/api/auth/me');
    currentPlans = await apiFetch('/api/plans/my');

    if (currentPlans.length === 0) {
      showToast('플랜을 먼저 구매해주세요.', 'error');
      setTimeout(() => { window.location.href = '/'; }, 1500);
      return;
    }

    updateNav();
    loadHistory();
  } catch {
    localStorage.removeItem('token');
    window.location.href = '/';
  }

  // Char count
  document.getElementById('essayText').addEventListener('input', updateCharCount);
});

async function apiFetch(path, options = {}) {
  const token = localStorage.getItem('token');
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...options, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || '요청에 실패했습니다.');
  return data;
}

function updateNav() {
  const plan = currentPlans[0];
  const credits = document.getElementById('navCredits');
  credits.textContent = `문항 ${plan.items_remaining}개 · 수정 ${plan.revisions_remaining}회 남음`;
}

function updateCharCount() {
  const text = document.getElementById('essayText').value;
  const len = text.length;
  const items = Math.max(1, Math.ceil(len / 800));
  const el = document.getElementById('charCount');
  el.textContent = `${len}자 (문항 ${items}개 소진 예상)`;
  el.className = len > 800 ? 'char-count warn' : 'char-count';
}

// ── Submit Review ──
async function submitReview() {
  const company = document.getElementById('companyName').value.trim();
  const question = document.getElementById('question').value.trim();
  const text = document.getElementById('essayText').value.trim();

  if (!company || !question || !text) {
    showToast('모든 항목을 입력해주세요.', 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-text').textContent = '첨삭 중... (약 30초)';

  try {
    const review = await apiFetch('/api/review', {
      method: 'POST',
      body: JSON.stringify({ company_name: company, question, text }),
    });
    currentReviewId = review.id;
    renderResult(JSON.parse(review.result), review);
    currentPlans = await apiFetch('/api/plans/my');
    updateNav();
    loadHistory();
    showToast('첨삭 완료!');
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.querySelector('.btn-text').textContent = '첨삭 시작하기';
  }
}

// ── Render Result ──
function renderResult(data, review) {
  document.getElementById('resultEmpty').style.display = 'none';
  const content = document.getElementById('resultContent');
  content.style.display = 'block';

  // Handle both initial review and revision formats
  const isRevision = !!data.changes_made;

  let html = '';

  if (!isRevision && data.company_analysis) {
    // Company analysis
    const ca = data.company_analysis;
    html += `
      <div class="result-section">
        <h3><span class="badge badge-blue">기업 분석</span> ${ca.company}</h3>
        <div class="company-box">
          <div class="values">${(ca.core_values || []).map(v => `<span>${v}</span>`).join('')}</div>
          <div class="strategy">${ca.reflection_strategy || ''}</div>
        </div>
      </div>`;
  }

  if (!isRevision && data.sentence_diagnosis) {
    // Sentence diagnosis
    html += `
      <div class="result-section">
        <h3><span class="badge badge-red">문장별 진단</span></h3>
        <div class="diag-list">
          ${data.sentence_diagnosis.map(d => `
            <div class="diag-item">
              <div class="diag-original">${escHtml(d.original)}</div>
              <div class="diag-issue">${escHtml(d.issue)} <span class="severity severity-${d.severity}">${d.severity}</span></div>
              <div class="diag-alt">${escHtml(d.alternative)}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  if (isRevision && data.changes_made) {
    html += `
      <div class="result-section">
        <h3><span class="badge badge-blue">수정 사항</span></h3>
        <div class="diag-list">
          ${data.changes_made.map(c => `
            <div class="diag-item">
              <div class="diag-original">${escHtml(c.before)}</div>
              <div class="diag-alt">${escHtml(c.after)}</div>
              <div style="font-size:13px;color:var(--text-secondary);margin-top:8px;">${escHtml(c.reason)}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  if (!isRevision && data.structure_feedback) {
    const sf = data.structure_feedback;
    const scoreColor = (v) => v >= 7 ? 'var(--green)' : v >= 5 ? '#fbbf24' : 'var(--red)';
    html += `
      <div class="result-section">
        <h3><span class="badge badge-blue">구조 분석</span></h3>
        <div class="scores-grid">
          <div class="score-item"><div class="score-val" style="color:${scoreColor(sf.flow_score)}">${sf.flow_score}</div><div class="score-label">흐름</div></div>
          <div class="score-item"><div class="score-val" style="color:${scoreColor(sf.logic_score)}">${sf.logic_score}</div><div class="score-label">논리</div></div>
          <div class="score-item"><div class="score-val" style="color:${scoreColor(sf.specificity_score)}">${sf.specificity_score}</div><div class="score-label">구체성</div></div>
          <div class="score-item"><div class="score-val" style="color:${scoreColor(sf.company_fit_score)}">${sf.company_fit_score}</div><div class="score-label">기업 적합도</div></div>
        </div>
        <p style="margin-top:12px;font-size:14px;color:var(--text-secondary);font-weight:300;line-height:1.7;">${escHtml(sf.overall_comment || '')}</p>
      </div>`;
  }

  if (data.revised_full_text) {
    html += `
      <div class="result-section">
        <h3><span class="badge badge-green">수정된 자소서</span></h3>
        <div class="revised-text">
          <button class="copy-btn" onclick="copyText(this)">복사</button>
          ${escHtml(data.revised_full_text)}
        </div>
      </div>`;
  }

  if (data.summary) {
    html += `
      <div class="result-section">
        <h3>요약</h3>
        <div class="summary-text">${escHtml(data.summary)}</div>
      </div>`;
  }

  // Revise section
  html += `
    <div class="revise-section">
      <h3>추가 수정 요청</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;font-weight:300;">
        수정하고 싶은 부분을 자유롭게 요청하세요. 예: "3번째 문장을 더 공격적으로", "성과 수치를 추가해줘"
      </p>
      <div class="revise-input">
        <textarea id="reviseInstruction" placeholder="수정 요청을 입력하세요..."></textarea>
        <button class="revise-btn" id="reviseBtn" onclick="submitRevise()">수정 요청</button>
      </div>
    </div>`;

  content.innerHTML = html;
}

// ── Revise ──
async function submitRevise() {
  if (!currentReviewId) return;
  const instruction = document.getElementById('reviseInstruction').value.trim();
  if (!instruction) {
    showToast('수정 요청을 입력해주세요.', 'error');
    return;
  }

  const btn = document.getElementById('reviseBtn');
  btn.disabled = true;
  btn.textContent = '수정 중...';

  try {
    const review = await apiFetch('/api/review/revise', {
      method: 'POST',
      body: JSON.stringify({ review_id: currentReviewId, instruction }),
    });
    renderResult(JSON.parse(review.result), review);
    currentPlans = await apiFetch('/api/plans/my');
    updateNav();
    showToast(`수정 완료! (${review.revision_count}회차)`);
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '수정 요청';
  }
}

// ── History ──
async function loadHistory() {
  try {
    history = await apiFetch('/api/review/history');
    const container = document.getElementById('historyItems');
    const wrapper = document.getElementById('historyList');

    if (history.length === 0) {
      wrapper.style.display = 'none';
      return;
    }
    wrapper.style.display = 'block';

    container.innerHTML = history.map(r => `
      <div class="history-item ${r.id === currentReviewId ? 'active' : ''}" onclick="loadReview(${r.id})">
        <div class="hi-company">${escHtml(r.company_name)}</div>
        <div class="hi-question">${escHtml(r.question)}</div>
        <div class="hi-meta">수정 ${r.revision_count}회 · ${new Date(r.created_at).toLocaleDateString('ko-KR')}</div>
      </div>
    `).join('');
  } catch {}
}

function loadReview(id) {
  const review = history.find(r => r.id === id);
  if (!review) return;
  currentReviewId = review.id;
  document.getElementById('companyName').value = review.company_name;
  document.getElementById('question').value = review.question;
  document.getElementById('essayText').value = review.original_text;
  updateCharCount();
  renderResult(JSON.parse(review.result), review);
  loadHistory(); // Update active state
}

// ── Helpers ──
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function copyText(btn) {
  const text = btn.parentElement.textContent.replace('복사', '').trim();
  navigator.clipboard.writeText(text);
  btn.textContent = '복사됨!';
  setTimeout(() => { btn.textContent = '복사'; }, 1500);
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' visible';
  setTimeout(() => t.classList.remove('visible'), 3000);
}

function doLogout() {
  localStorage.removeItem('token');
  window.location.href = '/';
}
</script>
